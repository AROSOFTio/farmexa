version: "3.9"
# ==============================================================================
# Production compose — exposes app on port 4002
# Host Nginx reverse-proxies farmexa.arosoft.io → localhost:4002
# ==============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: farmexa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perp_db}
      POSTGRES_USER: ${POSTGRES_USER:-perp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - farmexa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perp_user} -d ${POSTGRES_DB:-perp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmexa_net

  redis:
    image: redis:7-alpine
    container_name: farmexa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - farmexa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - farmexa_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmexa_backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - farmexa_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmexa_celery_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    networks:
      - farmexa_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmexa_celery_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - farmexa_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: farmexa_frontend
    restart: unless-stopped
    networks:
      - farmexa_net

  # Internal nginx — routes /api → backend, / → frontend
  # Exposed on host port 4002 for the server's reverse proxy
  nginx:
    image: nginx:alpine
    container_name: farmexa_nginx
    restart: unless-stopped
    ports:
      - "4002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - farmexa_net

volumes:
  farmexa_postgres_data:
  farmexa_redis_data:

networks:
  farmexa_net:
    driver: bridge
