version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: perp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-perp_db}
      POSTGRES_USER: ${POSTGRES_USER:-perp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perp_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perp_user} -d ${POSTGRES_DB:-perp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perp_net

  redis:
    image: redis:7-alpine
    container_name: perp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-perp_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-perp_redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perp_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perp_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - perp_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perp_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    networks:
      - perp_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: perp_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.schedulers:DatabaseScheduler
    networks:
      - perp_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: perp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - perp_net

  nginx:
    image: nginx:alpine
    container_name: perp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - perp_net

volumes:
  postgres_data:
  redis_data:

networks:
  perp_net:
    driver: bridge
