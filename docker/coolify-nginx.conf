# ── Infrastructure subdomains: close connection immediately ──────────────────
# These belong to other services (Coolify CP, mail, main website, etc.) and
# must NEVER receive Farmexa HTML or JSON.  nginx return 444 drops the TCP
# connection without sending any HTTP response.
server {
    listen 80;
    server_name cp.arosoftlabs.com
                mail.arosoftlabs.com
                courses.arosoftlabs.com
                my.arosoftlabs.com
                arofi.arosoftlabs.com
                api.arosoftlabs.com
                admin.arosoftlabs.com
                support.arosoftlabs.com
                arosoftlabs.com
                www.arosoftlabs.com;
    return 444;
}

# ── Farmexa: platform domain + provisioned tenant subdomains ─────────────────
# farm.arosoftlabs.com  → SaaS landing page / sign-in
# *.arosoftlabs.com     → Tenant workspaces (validated by the backend middleware)
server {
    listen 80;
    server_name farm.arosoftlabs.com *.arosoftlabs.com;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}

# ── Default catch-all: reject everything else silently ───────────────────────
# Any domain not explicitly matched above (unknown external domains, scanners,
# etc.) is dropped with no HTTP response. This prevents Farmexa from ever
# serving as the "default" site for unrelated traffic.
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
