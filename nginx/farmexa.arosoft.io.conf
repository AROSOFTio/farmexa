# ==============================================================================
# Farmexa host Nginx reverse-proxy reference.
#
# IMPORTANT:
# - Do not use this file to install SSL on aaPanel servers.
# - aaPanel and Cloudflare own certificate issuance and HTTPS configuration.
# - The Farmexa Docker stack only exposes the internal HTTP gateway on port 4021.
# - In aaPanel, create the site normally, let aaPanel issue SSL, then set the
#   site's reverse proxy target to http://127.0.0.1:4021.
# ==============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name myfarm.arosoftlabs.com farm.arosoftlabs.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
