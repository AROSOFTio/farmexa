# ==============================================================================
# Farmexa — aaPanel Nginx reverse-proxy reference
#
# DEPLOYMENT NOTES:
# 1. Do NOT use this file to manage SSL — let aaPanel issue certs via
#    Cloudflare DNS challenge for *.arosoftlabs.com (wildcard) so all tenant
#    subdomains get HTTPS without per-subdomain provisioning.
# 2. The Farmexa Docker stack exposes its internal HTTP gateway on port 4021.
#    In aaPanel: create the site → enable SSL → set reverse proxy → port 4021.
# 3. Configure SEPARATE aaPanel sites for infrastructure domains:
#      cp.arosoftlabs.com  → Coolify port (default 3000 / 8000)
#      mail.arosoftlabs.com → Mail server
#    Separate aaPanel sites will take Nginx precedence over the wildcard below.
#
# DNS REQUIREMENTS (Cloudflare):
#   A     farm.arosoftlabs.com   → 167.233.68.36  (DNS only or Proxied)
#   CNAME *.arosoftlabs.com      → farm.arosoftlabs.com (Proxied)
#   A     cp.arosoftlabs.com     → 167.233.68.36  (DNS only — Coolify)
#   A     arosoftlabs.com        → <main-website-IP> (DNS only)
#
# IMPORTANT: The wildcard CNAME routes ALL *.arosoftlabs.com through
# Cloudflare → farm.arosoftlabs.com → this server. The infrastructure block
# below (return 444) ensures Farmexa never serves those domains even if
# Cloudflare or a mis-routing sends them here. Individual tenant subdomains
# are also provisioned as explicit CNAME records by the Farmexa Cloudflare
# service as a belt-and-suspenders measure.
# ==============================================================================

# ── BLOCK 1: Infrastructure subdomains — close connection, no response ─────
# Any request for these domains that reaches the Farmexa server is rejected
# before Farmexa content can leak.  The respective services (Coolify, mail,
# etc.) should be configured as separate aaPanel sites so their requests never
# reach this block in the first place.
server {
    listen 80;
    listen [::]:80;
    server_name cp.arosoftlabs.com
                mail.arosoftlabs.com
                courses.arosoftlabs.com
                my.arosoftlabs.com
                arofi.arosoftlabs.com
                api.arosoftlabs.com
                admin.arosoftlabs.com
                support.arosoftlabs.com
                arosoftlabs.com
                www.arosoftlabs.com;
    # 444 = close TCP connection without sending HTTP response
    return 444;
}

# ── BLOCK 2: Farmexa platform + tenant subdomains ─────────────────────────
# farm.arosoftlabs.com  → Platform landing page, sign-up, sign-in
# *.arosoftlabs.com     → Provisioned tenant workspaces (backend validates)
server {
    listen 80;
    listen [::]:80;
    server_name farm.arosoftlabs.com *.arosoftlabs.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:4021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}

