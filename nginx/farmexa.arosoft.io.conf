# ==============================================================================
# farmexa.arosoft.io — Host Nginx reverse-proxy block
# Place this file in: /etc/nginx/sites-available/farmexa.arosoft.io
# Then: ln -s /etc/nginx/sites-available/farmexa.arosoft.io \
#              /etc/nginx/sites-enabled/farmexa.arosoft.io
# Then: nginx -t && systemctl reload nginx
# ==============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name farmexa.arosoft.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — reverse proxy to Docker stack on port 4002
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name farmexa.arosoft.io;

    # ── SSL (update paths after: certbot --nginx -d farmexa.arosoft.io) ──
    ssl_certificate     /etc/letsencrypt/live/farmexa.arosoft.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/farmexa.arosoft.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header X-XSS-Protection       "1; mode=block"         always;
    add_header X-Content-Type-Options  "nosniff"              always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upload limit ──────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/farmexa.access.log;
    error_log  /var/log/nginx/farmexa.error.log warn;

    # ── Proxy to Docker nginx (port 4002) ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # ── WebSocket support ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }
}
