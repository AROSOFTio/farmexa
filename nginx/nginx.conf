worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Infrastructure subdomains: close connection immediately ────────────
    # These belong to other services (Coolify CP, mail, main website, etc.)
    # and must NEVER receive Farmexa HTML or JSON.  nginx return 444 drops the
    # TCP connection without sending any HTTP response.
    server {
        listen 80;
        server_name cp.arosoftlabs.com
                    mail.arosoftlabs.com
                    courses.arosoftlabs.com
                    my.arosoftlabs.com
                    arofi.arosoftlabs.com
                    api.arosoftlabs.com
                    admin.arosoftlabs.com
                    support.arosoftlabs.com
                    arosoftlabs.com
                    www.arosoftlabs.com;
        return 444;
    }

    # ── Farmexa: platform domain + provisioned tenant subdomains ───────────
    # farm.arosoftlabs.com  → SaaS landing page / sign-in
    # *.arosoftlabs.com     → Tenant workspaces (validated by the backend middleware)
    server {
        listen 80;
        server_name farm.arosoftlabs.com *.arosoftlabs.com;

        client_max_body_size 50M;

        # API requests → FastAPI backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # WebSocket support for FastAPI /ws
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Static API docs
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # All other requests → React SPA
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Default catch-all: reject everything else silently ─────────────────
    # Any domain not explicitly matched above (unknown external domains, scanners,
    # etc.) is dropped with no HTTP response. This prevents Farmexa from ever
    # serving as the "default" site for unrelated traffic.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }
}
